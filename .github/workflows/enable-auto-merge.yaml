name: 🔀 Enable Auto-Merge

on:
  workflow_call:
    secrets:
      APP_PRIVATE_KEY:
        required: true
        description: "The private key for the GitHub App"
  ### Required Workflow Triggers ###
  pull_request:
  merge_group:
  ##################################

permissions: {}

jobs:
  auto-merge:
    permissions:
      pull-requests: write
      contents: write
    runs-on: ubuntu-latest
    if: ${{ !github.event.pull_request.draft && (github.event.pull_request.user.login == 'dependabot[bot]' || github.event.pull_request.user.login == 'renovate[bot]' || github.event.pull_request.user.login == 'botantler[bot]' || github.event.pull_request.user.login == 'devantler' || github.event.pull_request.user.login == 'Copilot') }}
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
        with:
          egress-policy: audit

      - name: 🔑 Generate GitHub App Token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        id: app-token
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: ✅ Approve PR
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPOSITORY: ${{ github.repository }}
        run: |
          if ! gh pr review "$PR_NUMBER" --approve --repo "$REPOSITORY" 2>&1; then
            echo "::warning::Could not approve PR #${PR_NUMBER} (self-authored PRs cannot be self-approved). Skipping approval."
          else
            echo "✅ PR #${PR_NUMBER} approved"
          fi

      - name: 🔀 Enable Auto-Merge
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPOSITORY: ${{ github.repository }}
        run: |
          REPO_INFO=$(gh api "repos/$REPOSITORY" --jq '.allow_auto_merge')
          if [[ "$REPO_INFO" != "true" ]]; then
            echo "::warning::Auto-merge is not enabled on this repository. Contact a repository admin to enable it in Settings > Pull Requests > Allow auto-merge."
            exit 0
          fi
          gh pr merge "$PR_NUMBER" --auto --squash --repo "$REPOSITORY"
          echo "✅ Auto-merge enabled for PR #${PR_NUMBER} using squash method"
