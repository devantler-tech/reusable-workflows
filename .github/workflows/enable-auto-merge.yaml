name: 🔀 Enable Auto-Merge

on:
  workflow_call:
    secrets:
      app-private-key:
        required: true
        description: "The private key for the GitHub App"
  ### Required Workflow Triggers ###
  pull_request:
  merge_group:
  ##################################

permissions: {}

jobs:
  auto-merge:
    permissions:
      pull-requests: write
      contents: write
    runs-on: ubuntu-latest
    if: ${{ !github.event.pull_request.draft && (github.event.pull_request.user.login == 'dependabot[bot]' || github.event.pull_request.user.login == 'renovate[bot]' || github.event.pull_request.user.login == 'botantler[bot]' || github.event.pull_request.user.login == 'devantler' || github.event.pull_request.user.login == 'Copilot') }}
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
        with:
          egress-policy: audit

      - name: 📑 Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: 🔀 Auto-merge
        uses: devantler-tech/actions/enable-auto-merge-on-pr@a7a2ace351e0d666607f4b8c4d59c875244bc21b # pending release
        with:
          app-id: ${{ vars.APP_ID }}
          app-private-key: ${{ secrets.app-private-key }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
