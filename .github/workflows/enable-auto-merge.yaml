name: 🔀 Enable Auto-Merge

on:
  workflow_call:
    secrets:
      APP_PRIVATE_KEY:
        required: true
        description: "The private key for the GitHub App"
  ### Required Workflow Triggers ###
  pull_request:
  merge_group:
  ##################################

permissions: {}

jobs:
  auto-merge:
    permissions:
      pull-requests: write
      contents: write
    runs-on: ubuntu-latest
    if: ${{ !github.event.pull_request.draft && (github.event.pull_request.user.login == 'dependabot[bot]' || github.event.pull_request.user.login == 'renovate[bot]' || github.event.pull_request.user.login == 'botantler[bot]' || github.event.pull_request.user.login == 'devantler' || github.event.pull_request.user.login == 'Copilot') }}
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
        with:
          egress-policy: audit

      - name: ✅ Approve PR
        uses: devantler-tech/actions/approve-pr@4235593b654b467bb57c2d2f492b1461eab37cba # v2.1.0
        with:
          app-id: ${{ vars.APP_ID }}
          APP_PRIVATE_KEY: ${{ secrets.APP_PRIVATE_KEY }}
          pr-number: ${{ github.event.pull_request.number }}

      - name: 🔀 Enable Auto-Merge
        uses: devantler-tech/actions/enable-auto-merge-on-pr@4235593b654b467bb57c2d2f492b1461eab37cba # v2.1.0
        with:
          pr-number: ${{ github.event.pull_request.number }}
