name: CI - GitOps Validate

on:
  workflow_call:
    inputs:
      KSAIL_VERSION:
        required: false
        type: string
        default: "latest"
  ### Required Workflow Triggers ###
  pull_request:
  merge_group:
  ##################################

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    # Ignore Require Workflow runs
    if: github.repository != 'devantler-tech/reusable-workflows'
    steps:
      - name: 📑 Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: 📥 Install KSail
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          KSAIL_VERSION: ${{ inputs.KSAIL_VERSION || 'latest' }}
          RUNNER_ARCH: ${{ runner.arch }}
        run: |
          set -euo pipefail
          case "$RUNNER_ARCH" in
            X64)   GOARCH="amd64" ;;
            ARM64) GOARCH="arm64" ;;
            *)     echo "❌ Unsupported arch: $RUNNER_ARCH" >&2; exit 1 ;;
          esac
          if [ "$KSAIL_VERSION" = "latest" ]; then
            KSAIL_VERSION=$(gh api repos/devantler-tech/ksail/releases/latest --jq '.tag_name' | sed 's/^v//')
          fi
          KSAIL_VERSION="${KSAIL_VERSION#v}"
          URL="https://github.com/devantler-tech/ksail/releases/download/v${KSAIL_VERSION}/ksail_${KSAIL_VERSION}_linux_${GOARCH}.tar.gz"
          echo "📥 Installing KSail v${KSAIL_VERSION} (${GOARCH})..."
          curl -fsSL "$URL" | tar -xz -C /usr/local/bin ksail
          chmod +x /usr/local/bin/ksail
          echo "✅ KSail v${KSAIL_VERSION} installed"
          ksail --version

      - name: 🧹 Validate GitOps cluster configuration
        run: |
          ksail workload validate
