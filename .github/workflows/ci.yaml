name: "🧪 CI"

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

concurrency:
  group: "ci-${{ github.event.number || github.sha }}"
  cancel-in-progress: true

permissions: {}

jobs:
  test-zizmor:
    name: "[Test] Zizmor - Default Settings"
    uses: ./.github/workflows/scan-for-workflow-vulnerabilities.yaml
    permissions:
      security-events: write
      contents: read
      actions: read

  test-delete-workflow-runs-all:
    name: "[Test] Delete Workflow Runs - All Workflows"
    uses: ./.github/workflows/delete-workflow-runs.yaml
    with:
      days: 30
      minimum-runs: 6
      delete-workflow-by-state-pattern: "ALL"
      delete-run-by-conclusion-pattern: "ALL"
      dry-run: true
    permissions:
      actions: write
      contents: read

  test-delete-workflow-runs-specific:
    name: "[Test] Delete Workflow Runs - Specific Pattern"
    uses: ./.github/workflows/delete-workflow-runs.yaml
    with:
      days: 7
      minimum-runs: 3
      delete-workflow-pattern: "test-delete-workflow-runs.yaml"
      delete-run-by-conclusion-pattern: "cancelled,failure"
      dry-run: true
    permissions:
      actions: write
      contents: read

  test-delete-workflow-runs-minimal:
    name: "[Test] Delete Workflow Runs - Minimal Parameters"
    uses: ./.github/workflows/delete-workflow-runs.yaml
    with:
      dry-run: true
    permissions:
      actions: write
      contents: read

  ci-required-checks:
    name: "CI - Required Checks"
    runs-on: ubuntu-latest
    needs:
      [
        test-zizmor,
        test-delete-workflow-runs-all,
        test-delete-workflow-runs-specific,
        test-delete-workflow-runs-minimal,
      ]
    permissions: {}
    if: ${{ always() }}
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
        with:
          egress-policy: audit

      - name: 📊 Require all CI checks to pass
        uses: devantler-tech/actions/require-checks-in-pr@1f66c91d45d374ceac9fe830a783444ebc9be958 # v3.2.0
        with:
          job-results: >-
            ${{ needs.test-zizmor.result }}
            ${{ needs.test-delete-workflow-runs-all.result }}
            ${{ needs.test-delete-workflow-runs-specific.result }}
            ${{ needs.test-delete-workflow-runs-minimal.result }}
