name: CD - Cluster Bootstrap (Cilium + Flux)

on:
  workflow_call:
    secrets:
      KUBE_CONFIG:
        required: true
        description: "Kubernetes config file"
      SOPS_AGE_KEY:
        required: true
        description: "Age key for SOPS"
    inputs:
      DEPLOYMENT_ENV:
        type: string
        required: true
        description: "Deployment environment (dev, prod)"
      SKIP:
        type: boolean
        required: false
        default: false
        description: "Skip bootstrap if true"

permissions:
  contents: read
  packages: write

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    environment: ${{ inputs.DEPLOYMENT_ENV }}
    steps:
      - name: 📑 Checkout
        if: ${{ inputs.SKIP != true }}
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: ⚙️ Setup flux
        if: ${{ inputs.SKIP != true }}
        uses: fluxcd/flux2/action@97222a775ae8e68f1e85508f356f248704255c9c # v2.8.1

      - name: ⚙️ Set kubernetes context
        if: ${{ inputs.SKIP != true }}
        uses: azure/k8s-set-context@ae59a723ba9abe7a9655538854a025448dbab4aa # v4.0.2
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBE_CONFIG }}

      - name: 🛠️ Install Cilium
        if: ${{ inputs.SKIP != true }}
        uses: devantler-tech/actions/install-cilium-action@884a9b7321e269351d5fc006d95e0b50b2ddedf6 # v1.9.7

      - name: 🛠️ Install Flux
        if: ${{ inputs.SKIP != true }}
        uses: devantler-tech/actions/install-flux-action@884a9b7321e269351d5fc006d95e0b50b2ddedf6 # v1.9.7

      - name: 🔐 Create secret for SOPS
        if: ${{ inputs.SKIP != true }}
        uses: azure/k8s-create-secret@6e0ba8047235646753f2a3a3b359b4d0006ff218 # v5.0.1
        with:
          secret-type: generic
          secret-name: sops-age
          namespace: flux-system
          string-data: '{ "sops.agekey": "${{ secrets.SOPS_AGE_KEY }}" }'

      - name: 🔁 Create OCI Source and Kustomization
        if: ${{ inputs.SKIP != true }}
        run: |
          if ! kubectl get ocirepositories flux-system -n flux-system > /dev/null 2>&1; then
            flux create source oci flux-system \
              --url="oci://ghcr.io/${GITHUB_REPOSITORY}/manifests-${DEPLOYMENT_ENV}" \
              --tag=latest
          else
            echo "OCI source 'flux-system' already exists. Skipping creation."
          fi

          if ! kubectl get kustomizations flux-system -n flux-system > /dev/null 2>&1; then
            flux create kustomization flux-system \
              --source=OCIRepository/flux-system \
              --path="clusters/${DEPLOYMENT_ENV}/" \
              --prune=true
          else
            echo "Kustomization 'flux-system' already exists. Skipping creation."
          fi
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          DEPLOYMENT_ENV: ${{ inputs.DEPLOYMENT_ENV }}
