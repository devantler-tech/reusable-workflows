name: 🔄 Update Copilot Skills

on:
  workflow_call:
    inputs:
      dir:
        description: Directory to scan for installed skills (passed to `gh skill update --dir`)
        required: false
        type: string
        default: "."
      unpin:
        description: When `true`, pass `--unpin` to `gh skill update` (clear pins and include pinned skills)
        required: false
        type: boolean
        default: false
      gh-version:
        description: Minimum required `gh` version (must support `gh skill`)
        required: false
        type: string
        default: 2.90.0
      pr-branch:
        description: Branch the update PR is opened from
        required: false
        type: string
        default: deps/copilot-skills-update
      pr-title:
        description: Title of the update PR
        required: false
        type: string
        default: "chore(deps): update copilot skills"
      pr-labels:
        description: Comma-separated labels applied to the update PR
        required: false
        type: string
        default: dependencies,automation
      commit-message:
        description: Commit message for the update PR
        required: false
        type: string
        default: "chore(deps): update copilot skills"
      dry-run:
        description: "Skip update and PR creation (validate workflow interface only)"
        required: false
        default: false
        type: boolean
      use-app-token:
        description: >-
          When `true`, create the update PR with a GitHub App token (minted from the `APP_ID`
          variable and the `APP_PRIVATE_KEY` secret) instead of the default `GITHUB_TOKEN`. A PR
          opened with `GITHUB_TOKEN` does NOT trigger the caller's `on: pull_request`/`push` CI runs,
          so its required checks never report and it stays blocked; an App token avoids this.
          Defaults to `false` (previous behaviour using `GITHUB_TOKEN`).
        required: false
        default: false
        type: boolean
    secrets:
      APP_PRIVATE_KEY:
        description: >-
          GitHub App private key, required only when `use-app-token` is `true`. Paired with the
          `APP_ID` repository/organization variable to mint an App token for PR creation.
        required: false

permissions: {}

jobs:
  update-copilot-skills:
    name: Update Copilot skills
    if: ${{ !inputs.dry-run }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: 🔑 Generate GitHub App token
        id: app-token
        if: ${{ inputs.use-app-token }}
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          # Scope the token to least privilege — exactly what this job needs
          # (checkout read + create-pull-request push/open) — instead of
          # inheriting the App installation's blanket permissions.
          permission-contents: write
          permission-pull-requests: write

      - name: 📄 Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          token: ${{ steps.app-token.outputs.token || github.token }}

      - name: 🔄 Update installed skills
        id: update
        uses: devantler-tech/actions/update-copilot-skills@59d3ffbe1a9437fcc39e2794fa2f221abe878310 # v3.3.0
        with:
          dir: ${{ inputs.dir }}
          unpin: ${{ inputs.unpin }}
          gh-version: ${{ inputs.gh-version }}

      - name: 📦 Create pull request
        if: steps.update.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          commit-message: ${{ inputs.commit-message }}
          title: ${{ inputs.pr-title }}
          body: |
            Automated update of Copilot skills to their latest versions.

            Updated files under `${{ inputs.dir }}`:

            ```
            ${{ steps.update.outputs.updated-skills }}
            ```
          branch: ${{ inputs.pr-branch }}
          labels: ${{ inputs.pr-labels }}
          delete-branch: true
          token: ${{ steps.app-token.outputs.token || github.token }}
          branch-token: ${{ steps.app-token.outputs.token || github.token }}
