name: 🔄 Update Copilot Skills

on:
  workflow_call:
    inputs:
      skills-lock:
        description: Path to the skills-lock.json manifest
        required: false
        type: string
        default: skills-lock.json
      agent:
        description: Value passed to `gh skill install --agent`
        required: false
        type: string
        default: github-copilot
      scope:
        description: Value passed to `gh skill install --scope` (`project` or `user`)
        required: false
        type: string
        default: repo
      gh-version:
        description: Minimum required `gh` version (must support `gh skill`)
        required: false
        type: string
        default: 2.90.0
      pr-branch:
        description: Branch the update PR is opened from
        required: false
        type: string
        default: deps/copilot-skills-update
      pr-title:
        description: Title of the update PR
        required: false
        type: string
        default: "chore(deps): update copilot skills"
      pr-labels:
        description: Comma-separated labels applied to the update PR
        required: false
        type: string
        default: dependencies,automation
      commit-message:
        description: Commit message for the update PR
        required: false
        type: string
        default: "chore(deps): update copilot skills"

permissions: {}

jobs:
  update-copilot-skills:
    name: Update Copilot skills
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
        with:
          egress-policy: audit

      - name: 📄 Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: true

      - name: 🔄 Resolve and pin latest skill refs
        uses: devantler-tech/actions/update-copilot-skills@bf04cc00fffcc37b573cdf045556f3f26fe9fe8c # main @ 2026-04-18
        with:
          skills-lock: ${{ inputs.skills-lock }}
          gh-version: ${{ inputs.gh-version }}

      - name: 📦 Install skills
        uses: devantler-tech/actions/setup-copilot-skills@bf04cc00fffcc37b573cdf045556f3f26fe9fe8c # main @ 2026-04-18
        with:
          skills-lock: ${{ inputs.skills-lock }}
          agent: ${{ inputs.agent }}
          scope: ${{ inputs.scope }}
          gh-version: ${{ inputs.gh-version }}

      - name: 📦 Create pull request
        uses: step-security/create-pull-request@e604d57b37b404d8bb34d152fa905e45d003a895 # v8.1.0
        with:
          commit-message: ${{ inputs.commit-message }}
          title: ${{ inputs.pr-title }}
          body: |
            Automated update of Copilot skills to their latest versions.

            Updated files:
            - `${{ inputs.skills-lock }}`
            - `.agents/skills/`
          branch: ${{ inputs.pr-branch }}
          labels: ${{ inputs.pr-labels }}
          delete-branch: true
