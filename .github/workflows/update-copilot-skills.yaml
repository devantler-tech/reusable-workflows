name: 🔄 Update Copilot Skills

on:
  workflow_call:
    inputs:
      dir:
        description: Directory to scan for installed skills (passed to `gh skill update --dir`)
        required: false
        type: string
        default: "."
      unpin:
        description: When `true`, pass `--unpin` to `gh skill update` (clear pins and include pinned skills)
        required: false
        type: boolean
        default: false
      gh-version:
        description: Minimum required `gh` version (must support `gh skill`)
        required: false
        type: string
        default: 2.90.0
      pr-branch:
        description: Branch the update PR is opened from
        required: false
        type: string
        default: deps/copilot-skills-update
      pr-title:
        description: Title of the update PR
        required: false
        type: string
        default: "chore(deps): update copilot skills"
      pr-labels:
        description: Comma-separated labels applied to the update PR
        required: false
        type: string
        default: dependencies,automation
      commit-message:
        description: Commit message for the update PR
        required: false
        type: string
        default: "chore(deps): update copilot skills"
      dry-run:
        description: "Skip update and PR creation (validate workflow interface only)"
        required: false
        default: false
        type: boolean

permissions: {}

jobs:
  update-copilot-skills:
    name: Update Copilot skills
    if: ${{ !inputs.dry-run }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df # v2.18.0
        with:
          egress-policy: audit

      - name: 📄 Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: true

      - name: 🔄 Update installed skills
        id: update
        uses: devantler-tech/actions/update-copilot-skills@a5339799d371b6952e7d3abdc9ea1ca096a28dfe # v3.1.1
        with:
          dir: ${{ inputs.dir }}
          unpin: ${{ inputs.unpin }}
          gh-version: ${{ inputs.gh-version }}

      - name: 📦 Create pull request
        if: steps.update.outputs.changed == 'true'
        uses: step-security/create-pull-request@e604d57b37b404d8bb34d152fa905e45d003a895 # v8.1.0
        with:
          commit-message: ${{ inputs.commit-message }}
          title: ${{ inputs.pr-title }}
          body: |
            Automated update of Copilot skills to their latest versions.

            Updated files under `${{ inputs.dir }}`:

            ```
            ${{ steps.update.outputs.updated-skills }}
            ```
          branch: ${{ inputs.pr-branch }}
          labels: ${{ inputs.pr-labels }}
          delete-branch: true
