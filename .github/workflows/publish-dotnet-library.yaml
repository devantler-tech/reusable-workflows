name: 📦 Publish .NET Library

on:
  workflow_call:
    inputs:
      dry-run:
        description: "Skip publish (validate workflow interface only)"
        required: false
        default: false
        type: boolean
    secrets:
      NUGET_API_KEY:
        required: false

permissions: {}

jobs:
  publish:
    if: ${{ !inputs.dry-run }}
    permissions:
      contents: read
      packages: write
    runs-on: ubuntu-latest
    steps:
      - name: 🛡️ Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: 📑 Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: ⚙️ Setup .NET
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.2.0
        with:
          # Provision both the previous STS (9) and the current LTS (10) so libraries
          # targeting either TFM publish cleanly. Multiple lines install side-by-side SDKs.
          dotnet-version: |
            9
            10

      - name: 🚚 Publish
        shell: bash
        run: |
          dotnet tool install --global dotnet-releaser
          dotnet-releaser run --nuget-token "${NUGET_API_KEY}" --github-token "${GITHUB_TOKEN}" dotnet-releaser.toml
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
