name: 📝 Scan for TODO Comments

on:
  workflow_call:
    inputs:
      dry-run:
        description: "Skip issue creation (validate workflow interface only)"
        required: false
        default: false
        type: boolean
    secrets:
      APP_PRIVATE_KEY:
        required: true

permissions: {}

jobs:
  todos:
    if: ${{ !inputs.dry-run }}
    permissions:
      contents: read
      issues: write
    runs-on: ubuntu-latest
    steps:
      - name: 📑 Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: 📝 Create issues from TODOs
        uses: devantler-tech/actions/create-issues-from-todos@17691ce06f7c2324d7a41a60ec9cc3baf471bfea # v3.2.4
        with:
          app-id: ${{ vars.APP_ID }}
          app-private-key: ${{ secrets.APP_PRIVATE_KEY }}
          project: organization/devantler-tech/5
