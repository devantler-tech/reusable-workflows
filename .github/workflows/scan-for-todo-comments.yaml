name: 📝 Scan for TODO Comments

on:
  workflow_call:
    inputs:
      dry-run:
        description: "Skip issue creation (validate workflow interface only)"
        required: false
        default: false
        type: boolean
    secrets:
      APP_PRIVATE_KEY:
        required: true

permissions: {}

jobs:
  todos:
    if: ${{ !inputs.dry-run }}
    permissions:
      contents: read
      issues: write
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
        with:
          egress-policy: audit

      - name: 📑 Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: 📝 Create issues from TODOs
        uses: devantler-tech/actions/create-issues-from-todos@961f62f4a771b31e48acaae4a619cef6c7fe2195 # v2.1.1
        with:
          app-id: ${{ vars.APP_ID }}
          app-private-key: ${{ secrets.APP_PRIVATE_KEY }}
          project: organization/devantler-tech/5
