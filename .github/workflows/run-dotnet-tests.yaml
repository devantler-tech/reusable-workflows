name: 🧪 Run .NET Tests

permissions: {}

on:
  workflow_call:
    secrets:
      APP_PRIVATE_KEY:
        required: true
  ### Required Workflow Triggers ###
  pull_request:
  merge_group:
  ##################################

jobs:
  test:
    permissions:
      contents: read
      packages: read
      # Required for the GitHub Code Quality coverage upload. Callers of this reusable workflow
      # must also grant `code-quality: write`, or the run fails at startup.
      code-quality: write
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    # Ignore Require Workflow runs
    if: github.repository != 'devantler-tech/reusable-workflows'
    steps:
      - name: 📑 Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: 🧪 Test .NET solution or project
        uses: devantler-tech/actions/run-dotnet-tests@6916c45ed8dc22e62cb12f021480e29732d03575 # v5.1.0
        with:
          app-id: ${{ vars.APP_ID }}
          app-private-key: ${{ secrets.APP_PRIVATE_KEY }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
