name: 🧪 Run .NET Tests

permissions: {}

on:
  workflow_call:
  ### Required Workflow Triggers ###
  pull_request:
  merge_group:
  ##################################

jobs:
  test:
    permissions:
      contents: read
      packages: read
      # Required for the GitHub Code Quality coverage upload. Callers of this reusable workflow
      # must also grant `code-quality: write`, or the run fails at startup.
      code-quality: write
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    # Ignore Require Workflow runs
    if: github.repository != 'devantler-tech/reusable-workflows'
    steps:
      - name: 🛡️ Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: 📑 Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: 🧪 Test .NET solution or project
        uses: devantler-tech/actions/run-dotnet-tests@9d98cb8be059537ec1e82f71c90d75ecba321713 # v6.1.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
