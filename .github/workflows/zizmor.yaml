name: Zizmor

permissions: {}

on:
  workflow_call:
  ### Required Workflow Triggers ###
  pull_request:
  merge_group:
  ##################################

jobs:
  zizmor:
    runs-on: ubuntu-latest
    if: github.event_name != 'merge_group'
    permissions:
      security-events: write
      contents: read # only needed for private repos
      actions: read # only needed for private repos
    steps:
      - name: 📑 Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: 🔍 Check for zizmor config
        id: config
        run: |
          if [ -f "zizmor.yml" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: 🌈 Zizmor
        uses: zizmorcore/zizmor-action@195d10ad90f31d8cd6ea1efd6ecc12969ddbe73f # v0.5.1
        with:
          config: ${{ steps.config.outputs.exists == 'true' && 'zizmor.yml' || '' }}
