name: ✅ Validate Go Project

on:
  workflow_call:
    inputs:
      pr-owner:
        required: false
        type: string
        description: "Pull request author login (used to disable auto-commit for bot PRs)"
    secrets:
      CODECOV_TOKEN:
        required: false
        description: "Codecov token for uploading coverage reports"
      APP_PRIVATE_KEY:
        description: "GitHub App Private Key"
        required: false
  ### Required Workflow Triggers ###
  pull_request:
  merge_group:
  ##################################

concurrency:
  group: "validate-go-project-${{ github.repository }}-${{ github.ref }}"
  cancel-in-progress: true

permissions: {}

jobs:
  # Detect if Go files changed to conditionally skip jobs for non-Go changes
  changes:
    name: 🔍 Detect Changes
    runs-on: ubuntu-latest
    # Ignore Required Workflow runs on the reusable-workflows repo itself
    # Skip merge queue — these checks already passed on the PR
    if: >-
      github.repository != 'devantler-tech/reusable-workflows'
      && github.event_name != 'merge_group'
    permissions:
      contents: read
      pull-requests: read
    outputs:
      go: ${{ steps.filter.outputs.go }}
      lintable: ${{ steps.filter.outputs.lintable }}
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
        with:
          egress-policy: audit

      - name: 📄 Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: 🔍 Filter paths
        uses: step-security/paths-filter@5c5241b8233e77b55b9046daf88f1cb7560281de # v4.0.1
        id: filter
        with:
          filters: |
            go:
              - '**/*.go'
              - 'go.mod'
              - 'go.sum'
              - '.golangci.yml'
              - '.golangci.yaml'
            # Files lintable by MegaLinter Go flavor (excluding Go files which are covered above)
            lintable:
              # Languages
              - '**/*.sh'
              - '**/*.bash'
              - '**/*.groovy'
              - '**/*.gradle'
              - '**/*.kt'
              - '**/*.kts'
              - '**/*.sql'
              # Formats
              - '**/*.css'
              - '**/*.scss'
              - '**/*.env'
              - '.env*'
              - '**/*.graphql'
              - '**/*.gql'
              - '**/*.html'
              - '**/*.htm'
              - '**/*.json'
              - '**/*.md'
              - '**/*.markdown'
              - '**/*.proto'
              - '**/*.xml'
              - '**/*.yaml'
              - '**/*.yml'
              # Tooling formats
              - '.github/workflows/**'
              - '**/Dockerfile*'
              - '**/*.dockerfile'
              - '.editorconfig'
              - '**/Chart.yaml'
              - '**/values.yaml'
              - '**/templates/**/*.yaml'
              - '**/templates/**/*.yml'
              # Linter config files (changes to these should trigger linting)
              - '.mega-linter.yml'
              - '.mega-linter.yaml'
              - '.markdownlint.json'
              - '.markdownlint.yaml'
              - '.markdownlint.yml'
              - '.yamllint.yml'
              - '.yamllint.yaml'
              - '.hadolint.yaml'
              - '.hadolint.yml'
              - '.cspell.json'
              - 'cspell.json'
              - '.vale.ini'
              - '.prettierrc'
              - '.prettierrc.*'
              - 'lychee.toml'
              - '.ls-lint.yml'
              - '.secretlintrc.*'
              - '.gitleaksignore'

  tidy:
    name: 📦 Tidy
    runs-on: ubuntu-latest
    needs: [changes]
    # Skip if no Go files changed or on main/master branches or on reusable-workflows repo or in merge queue
    if: |
      github.repository != 'devantler-tech/reusable-workflows'
      && needs.changes.outputs.go == 'true'
      && github.ref != 'refs/heads/main'
      && github.ref != 'refs/heads/master'
      && github.event_name != 'merge_group'
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
        with:
          egress-policy: audit

      - name: 🔑 Generate GitHub App Token
        continue-on-error: true
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        id: generate-token
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: 📄 Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: ${{ steps.generate-token.outcome == 'success' }}
          token: ${{ steps.generate-token.outputs.token || github.token }}

      - name: ⚙️ Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - name: 🧹 go mod tidy
        run: go mod tidy

      - name: 💾 Commit and push applied linter fixes
        if: |
          steps.generate-token.outcome == 'success'
          && !contains(fromJSON('["dependabot[bot]","dependabot","renovate[bot]","renovatebot","renovate"]'), github.event.pull_request.user.login)
          && !contains(fromJSON('["dependabot[bot]","dependabot","renovate[bot]","renovatebot","renovate"]'), inputs.pr-owner)
        uses: step-security/git-auto-commit-action@905c3cd6e9ed2b67b4d46ff401fdb6d745d0ff9d # v7.1.0
        with:
          commit_message: "chore: tidy go modules"
          commit_user_name: tidy-bot
          commit_user_email: tidy-bot@users.noreply.github.com

      - name: ❌ Fail if uncommitted changes remain (fork PR)
        if: steps.generate-token.outcome != 'success'
        shell: bash
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "::error::Auto-fix produced changes that cannot be committed (fork PR). Please run the fix locally and push."
            echo ""
            echo "Changed files:"
            git diff --stat
            echo ""
            echo "Full diff:"
            git diff
            exit 1
          fi

  golangci-lint:
    name: 🧹 Lint - golangci-lint
    runs-on: ubuntu-latest
    needs: [changes]
    # Skip if no Go files changed or on reusable-workflows repo
    if: |
      github.repository != 'devantler-tech/reusable-workflows'
      && needs.changes.outputs.go == 'true'
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
        with:
          egress-policy: audit

      - name: 🔑 Generate GitHub App Token
        continue-on-error: true
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        id: generate-token
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: 📄 Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: ${{ steps.generate-token.outcome == 'success' }}
          token: ${{ steps.generate-token.outputs.token || github.token }}

      - name: ⚙️ Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - name: 🧹 Run golangci-lint
        id: golangci-lint
        uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9.2.0
        with:
          version: v2.11.4
          args: --fix

      - name: 💾 Commit and push applied linter fixes
        if: |
          steps.generate-token.outcome == 'success'
          && github.event_name != 'merge_group'
          && !contains(fromJSON('["dependabot[bot]","dependabot","renovate[bot]","renovatebot","renovate"]'), github.event.pull_request.user.login)
          && !contains(fromJSON('["dependabot[bot]","dependabot","renovate[bot]","renovatebot","renovate"]'), inputs.pr-owner)
        uses: step-security/git-auto-commit-action@905c3cd6e9ed2b67b4d46ff401fdb6d745d0ff9d # v7.1.0
        with:
          commit_message: "chore: apply golangci-lint fixes"
          commit_user_name: golangci-lint-bot
          commit_user_email: golangci-lint-bot@users.noreply.github.com

      - name: ❌ Fail if uncommitted changes remain (fork PR)
        if: steps.generate-token.outcome != 'success'
        shell: bash
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "::error::Auto-fix produced changes that cannot be committed (fork PR). Please run the fix locally and push."
            echo ""
            echo "Changed files:"
            git diff --stat
            echo ""
            echo "Full diff:"
            git diff
            exit 1
          fi

  deadcode:
    name: 🔍 Dead Code Analysis
    runs-on: ubuntu-latest
    needs: [changes]
    # Skip if no Go files changed or on reusable-workflows repo; only on PRs
    if: |
      github.repository != 'devantler-tech/reusable-workflows'
      && needs.changes.outputs.go == 'true'
      && github.event_name == 'pull_request'
    permissions:
      contents: read
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
        with:
          egress-policy: audit

      - name: 📄 Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: ⚙️ Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: 📥 Install deadcode
        run: go install golang.org/x/tools/cmd/deadcode@v0.43.0

      - name: 🔍 Check for dead code
        run: |
          output_file="$(mktemp)"
          trap 'rm -f "$output_file"' EXIT

          deadcode -test ./... >"$output_file"

          if [ -s "$output_file" ]; then
            echo "::error::Dead code detected. Remove unreachable functions before merging."
            cat "$output_file"
            exit 1
          fi
          echo "No dead code found ✅"

  lint:
    name: 🧹 Lint - mega-linter
    runs-on: ubuntu-latest
    needs: [changes]
    # Run if Go files OR other lintable files changed (markdown, yaml, json, etc.)
    if: |
      github.repository != 'devantler-tech/reusable-workflows'
      && (needs.changes.outputs.go == 'true' || needs.changes.outputs.lintable == 'true')
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
        with:
          egress-policy: audit

      - name: 🔑 Generate GitHub App Token
        continue-on-error: true
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        id: generate-token
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: 📄 Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: ${{ steps.generate-token.outcome == 'success' }}
          token: ${{ steps.generate-token.outputs.token || github.token }}

      - name: ⚙️ Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - name: 🧹 Lint
        id: ml
        uses: oxsecurity/megalinter/flavors/go@8fbdead70d1409964ab3d5afa885e18ee85388bb # v9.4.0
        env:
          VALIDATE_ALL_CODEBASE: true
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLY_FIXES: all
          APPLY_FIXES_EVENT: all
          APPLY_FIXES_MODE: commit

      - name: Commit and push applied linter fixes
        if: |
          steps.generate-token.outcome == 'success'
          && github.event_name != 'merge_group'
          && !contains(fromJSON('["dependabot[bot]","dependabot","renovate[bot]","renovatebot","renovate"]'), github.event.pull_request.user.login)
          && !contains(fromJSON('["dependabot[bot]","dependabot","renovate[bot]","renovatebot","renovate"]'), inputs.pr-owner)
        uses: step-security/git-auto-commit-action@905c3cd6e9ed2b67b4d46ff401fdb6d745d0ff9d # v7.1.0
        with:
          commit_message: "chore: Apply megalinter fixes"
          commit_user_name: megalinter-bot
          commit_user_email: 129584137+megalinter-bot@users.noreply.github.com

      - name: ❌ Fail if uncommitted changes remain (fork PR)
        if: steps.generate-token.outcome != 'success'
        shell: bash
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "::error::Auto-fix produced changes that cannot be committed (fork PR). Please run the fix locally and push."
            echo ""
            echo "Changed files:"
            git diff --stat
            echo ""
            echo "Full diff:"
            git diff
            exit 1
          fi

  build:
    name: 🏗️ Build
    runs-on: ubuntu-latest
    needs: [changes]
    # Skip if no Go files changed or on reusable-workflows repo
    if: |
      github.repository != 'devantler-tech/reusable-workflows'
      && needs.changes.outputs.go == 'true'
    permissions:
      contents: write
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
        with:
          egress-policy: audit

      - name: 📑 Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: ⚙️ Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: 🛠️ Build
        run: go build -v ./...

  test:
    name: 🧪 Test
    runs-on: ubuntu-latest
    needs: [changes]
    # Skip if no Go files changed or on reusable-workflows repo
    if: |
      github.repository != 'devantler-tech/reusable-workflows'
      && needs.changes.outputs.go == 'true'
    permissions:
      contents: write
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
        with:
          egress-policy: audit

      - name: 📑 Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: ⚙️ Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: 🧪 Test
        run: |
          go test ./...

  coverage:
    name: 📊 Code Coverage
    runs-on: ubuntu-latest
    needs: [changes]
    # Skip if no Go files changed or on reusable-workflows repo
    if: |
      github.repository != 'devantler-tech/reusable-workflows'
      && needs.changes.outputs.go == 'true'
    permissions:
      contents: write
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
        with:
          egress-policy: audit

      - name: 📑 Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: ⚙️ Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: 👨🏻‍🔧 Enable covdata (temp) see https://github.com/golang/go/issues/75031
        run: go env -w GOTOOLCHAIN=go1.26.0+auto

      - name: 📄 Generate coverage
        run: |
          go test -race -coverprofile=coverage.txt -covermode=atomic ./...

      - name: 📄 Upload coverage to Codecov
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
