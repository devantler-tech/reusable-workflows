name: ✅ Validate Go Project

on:
  workflow_call:
    inputs:
      pr-owner:
        required: false
        type: string
        description: "Pull request author login (used to disable auto-commit for bot PRs)"
    secrets:
      APP_PRIVATE_KEY:
        description: "GitHub App Private Key"
        required: false
  ### Required Workflow Triggers ###
  pull_request:
  merge_group:
  ##################################

concurrency:
  group: "validate-go-project-${{ github.repository }}-${{ github.ref }}"
  cancel-in-progress: true

permissions: {}

jobs:
  # Detect if Go files changed to conditionally skip jobs for non-Go changes
  changes:
    name: 🔍 Detect Changes
    runs-on: ubuntu-latest
    # Ignore Required Workflow runs on the reusable-workflows repo itself
    # Skip merge queue — these checks already passed on the PR
    if: >-
      github.repository != 'devantler-tech/reusable-workflows'
      && github.event_name != 'merge_group'
    permissions:
      contents: read
      pull-requests: read
    outputs:
      go: ${{ steps.filter.outputs.go }}
      lintable: ${{ steps.filter.outputs.lintable }}
    steps:
      - name: 🛡️ Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: 📄 Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: 🔍 Filter paths
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          filters: |
            go:
              - '**/*.go'
              - 'go.mod'
              - 'go.sum'
              - '.golangci.yml'
              - '.golangci.yaml'
            # Files lintable by MegaLinter Go flavor (excluding Go files which are covered above)
            lintable:
              # Languages
              - '**/*.sh'
              - '**/*.bash'
              - '**/*.groovy'
              - '**/*.gradle'
              - '**/*.kt'
              - '**/*.kts'
              - '**/*.sql'
              # Formats
              - '**/*.css'
              - '**/*.scss'
              - '**/*.env'
              - '.env*'
              - '**/*.graphql'
              - '**/*.gql'
              - '**/*.html'
              - '**/*.htm'
              - '**/*.json'
              - '**/*.md'
              - '**/*.markdown'
              - '**/*.proto'
              - '**/*.xml'
              - '**/*.yaml'
              - '**/*.yml'
              # Tooling formats
              - '.github/workflows/**'
              - '**/Dockerfile*'
              - '**/*.dockerfile'
              - '.editorconfig'
              - '**/Chart.yaml'
              - '**/values.yaml'
              - '**/templates/**/*.yaml'
              - '**/templates/**/*.yml'
              # Linter config files (changes to these should trigger linting)
              - '.mega-linter.yml'
              - '.mega-linter.yaml'
              - '.markdownlint.json'
              - '.markdownlint.yaml'
              - '.markdownlint.yml'
              - '.yamllint.yml'
              - '.yamllint.yaml'
              - '.hadolint.yaml'
              - '.hadolint.yml'
              - '.cspell.json'
              - 'cspell.json'
              - '.vale.ini'
              - '.prettierrc'
              - '.prettierrc.*'
              - 'lychee.toml'
              - '.ls-lint.yml'
              - '.secretlintrc.*'
              - '.gitleaksignore'

  tidy:
    name: 📦 Tidy
    runs-on: ubuntu-latest
    needs: [changes]
    # Skip if no Go files changed or on main/master branches or on reusable-workflows repo or in merge queue
    if: |
      github.repository != 'devantler-tech/reusable-workflows'
      && needs.changes.outputs.go == 'true'
      && github.ref != 'refs/heads/main'
      && github.ref != 'refs/heads/master'
      && github.event_name != 'merge_group'
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: 🛡️ Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: 🔑 Generate GitHub App Token
        continue-on-error: true
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: generate-token
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          # Least-privilege token scope: only pushes linter auto-fixes back to the PR
          # branch (contents); the token is never used for PR/issue API calls.
          permission-contents: write

      - name: 📄 Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: ${{ steps.generate-token.outcome == 'success' }}
          token: ${{ steps.generate-token.outputs.token || github.token }}

      - name: ⚙️ Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - name: 🧹 go mod tidy
        run: go mod tidy

      - name: 💾 Commit and push applied linter fixes
        if: |
          steps.generate-token.outcome == 'success'
          && !contains(fromJSON('["dependabot[bot]","dependabot","renovate[bot]","renovatebot","renovate"]'), github.event.pull_request.user.login)
          && !contains(fromJSON('["dependabot[bot]","dependabot","renovate[bot]","renovatebot","renovate"]'), inputs.pr-owner)
        uses: stefanzweifel/git-auto-commit-action@04702edda442b2e678b25b537cec683a1493fcb9 # v7.1.0
        with:
          commit_message: "chore: tidy go modules"
          commit_user_name: tidy-bot
          commit_user_email: tidy-bot@users.noreply.github.com

      - name: ❌ Fail if uncommitted changes remain (fork PR)
        if: steps.generate-token.outcome != 'success'
        shell: bash
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "::error::Auto-fix produced changes that cannot be committed (fork PR). Please run the fix locally and push."
            echo ""
            echo "Changed files:"
            git diff --stat
            echo ""
            echo "Full diff:"
            git diff
            exit 1
          fi

  golangci-lint:
    name: 🧹 Lint - golangci-lint
    runs-on: ubuntu-latest
    needs: [changes]
    # Skip if no Go files changed or on reusable-workflows repo
    if: |
      github.repository != 'devantler-tech/reusable-workflows'
      && needs.changes.outputs.go == 'true'
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: 🛡️ Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: 🔑 Generate GitHub App Token
        continue-on-error: true
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: generate-token
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          # Least-privilege token scope: only pushes linter auto-fixes back to the PR
          # branch (contents); the token is never used for PR/issue API calls.
          permission-contents: write

      - name: 📄 Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: ${{ steps.generate-token.outcome == 'success' }}
          token: ${{ steps.generate-token.outputs.token || github.token }}

      - name: ⚙️ Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - name: 🧹 Run golangci-lint
        id: golangci-lint
        uses: golangci/golangci-lint-action@82606bf257cbaff209d206a39f5134f0cfbfd2ee # v9.2.1
        with:
          version: v2.11.4
          args: --fix

      - name: 💾 Commit and push applied linter fixes
        if: |
          steps.generate-token.outcome == 'success'
          && github.event_name != 'merge_group'
          && !contains(fromJSON('["dependabot[bot]","dependabot","renovate[bot]","renovatebot","renovate"]'), github.event.pull_request.user.login)
          && !contains(fromJSON('["dependabot[bot]","dependabot","renovate[bot]","renovatebot","renovate"]'), inputs.pr-owner)
        uses: stefanzweifel/git-auto-commit-action@04702edda442b2e678b25b537cec683a1493fcb9 # v7.1.0
        with:
          commit_message: "chore: apply golangci-lint fixes"
          commit_user_name: golangci-lint-bot
          commit_user_email: golangci-lint-bot@users.noreply.github.com

      - name: ❌ Fail if uncommitted changes remain (fork PR)
        if: steps.generate-token.outcome != 'success'
        shell: bash
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "::error::Auto-fix produced changes that cannot be committed (fork PR). Please run the fix locally and push."
            echo ""
            echo "Changed files:"
            git diff --stat
            echo ""
            echo "Full diff:"
            git diff
            exit 1
          fi

  deadcode:
    name: 🔍 Dead Code Analysis
    runs-on: ubuntu-latest
    needs: [changes]
    # Skip if no Go files changed or on reusable-workflows repo; only on PRs
    if: |
      github.repository != 'devantler-tech/reusable-workflows'
      && needs.changes.outputs.go == 'true'
      && github.event_name == 'pull_request'
    permissions:
      contents: read
    steps:
      - name: 🛡️ Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: 📄 Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: ⚙️ Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: 📥 Install deadcode
        run: go install golang.org/x/tools/cmd/deadcode@v0.43.0

      - name: 🔍 Check for dead code
        run: |
          output_file="$(mktemp)"
          trap 'rm -f "$output_file"' EXIT

          deadcode -test ./... >"$output_file"

          if [ -s "$output_file" ]; then
            echo "::error::Dead code detected. Remove unreachable functions before merging."
            cat "$output_file"
            exit 1
          fi
          echo "No dead code found ✅"

  govulncheck:
    name: 🛡️ Vulnerability Scan
    runs-on: ubuntu-latest
    needs: [changes]
    # Skip if no Go files changed or on reusable-workflows repo; only on PRs
    if: |
      github.repository != 'devantler-tech/reusable-workflows'
      && needs.changes.outputs.go == 'true'
      && github.event_name == 'pull_request'
    permissions:
      contents: read
    # govulncheck's default symbol scan builds a whole-program call graph in memory,
    # whose peak grows with the module's dependency graph. On large modules (e.g. ones
    # importing Kubernetes / Flux / Talos clients) it can exhaust the hosted runner's RAM,
    # which the host resolves by killing the runner mid-scan (exit 143 / "runner has
    # received a shutdown signal") — an opaque, retry-resistant failure. GOMEMLIMIT caps
    # the Go runtime's heap so the GC reclaims aggressively and stays under the host
    # ceiling instead of OOM-killing; timeout-minutes bounds the worst case to a clear,
    # fast failure rather than a hung runner.
    timeout-minutes: 15
    env:
      # ubuntu-latest provides 16 GiB RAM; leave headroom for the OS, the Go toolchain
      # subprocesses and harden-runner.
      GOMEMLIMIT: 12GiB
    steps:
      - name: 🛡️ Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: 📄 Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: ⚙️ Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: 📥 Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@v1.3.0

      # govulncheck reports only vulnerabilities your code actually CALLS (call-graph
      # reachability), so the gate trips only on genuinely reachable issues — imported-but-
      # unreachable advisories never block. Normally you clear a finding by bumping the
      # affected module or dropping the call. But some reachable advisories have NO upstream
      # fix (`Fixed in: N/A`) — e.g. server-side symbols a CLI links transitively via
      # k8s.io/kubernetes or docker/docker. A hard gate would then wedge EVERY Go PR on that
      # consumer indefinitely, through no fault of the PR. To keep the gate strict by default
      # yet allow explicit, reviewed, version-controlled risk acceptance, scan in JSON mode
      # (which exits 0 on findings) and fail only on reachable findings whose advisory ID is
      # NOT listed in an optional consumer-owned allowlist file.
      #
      # .govulncheck-allow.txt (repo root, OPTIONAL): one accepted advisory ID per line, e.g.
      #   GO-2025-3547  # k8s apiserver race — this is a client CLI, not an apiserver (owner, 2026-06)
      # blank lines and `#` comments are ignored. No file ⇒ strict (the original behaviour,
      # unchanged): every reachable advisory blocks.
      - name: 🛡️ Scan for known vulnerabilities
        run: |
          set -euo pipefail
          # One scan only (expensive on large modules). JSON mode exits 0 even when
          # vulnerabilities are found, so a non-zero exit here is an OPERATIONAL error
          # (e.g. packages failed to load) and must fail the gate loudly.
          rc=0
          govulncheck -format json ./... > govuln.json || rc=$?
          if [ "$rc" -ne 0 ]; then
            echo "::error::govulncheck failed to run (exit $rc) — operational error, not a scan result."
            exit "$rc"
          fi

          # Reachable ("called") findings: a finding whose top trace frame is a function
          # (mirrors govulncheck's own IsCalled: len(Trace)>0 && Trace[0].Function != "").
          called="$(jq -r 'select(.finding).finding | select(.trace[0].function != null and .trace[0].function != "") | .osv' govuln.json | sort -u)"

          # Optional allowlist of accepted, justified advisory IDs.
          allow=""
          if [ -f .govulncheck-allow.txt ]; then
            allow="$(sed 's/#.*//' .govulncheck-allow.txt | tr -s ' \t' '\n' | grep -E '^GO-[0-9]{4}-[0-9]+$' | sort -u || true)"
          fi

          # Summarise every reachable advisory and compute the blocking set
          # (reachable minus allowlisted).
          blocking=""
          if [ -n "$called" ]; then
            echo "Reachable vulnerabilities:"
            for id in $called; do
              fixed="$(jq -r --arg id "$id" 'select(.finding).finding | select(.osv==$id) | .fixed_version // empty' govuln.json | grep -v '^$' | head -n1 || true)"
              [ -z "$fixed" ] && fixed="N/A"
              if printf '%s\n' "$allow" | grep -qx "$id"; then
                echo "  - $id (fixed: $fixed) — ALLOWLISTED"
              else
                echo "  - $id (fixed: $fixed) — BLOCKING"
                blocking="$blocking $id"
              fi
            done
          else
            echo "No reachable vulnerabilities found."
          fi

          if [ -n "$blocking" ]; then
            echo "::error::Reachable vulnerabilities not accepted in .govulncheck-allow.txt:$blocking"
            echo "Either bump the affected module (preferred) or, if no fix exists and the advisory is not exploitable in this project, add it to .govulncheck-allow.txt with a justification."
            exit 1
          fi
          echo "✅ No blocking vulnerabilities (allowlisted advisories, if any, were explicitly accepted)."

  lint:
    name: 🧹 Lint - mega-linter
    runs-on: ubuntu-latest
    needs: [changes]
    # Run if Go files OR other lintable files changed (markdown, yaml, json, etc.)
    if: |
      github.repository != 'devantler-tech/reusable-workflows'
      && (needs.changes.outputs.go == 'true' || needs.changes.outputs.lintable == 'true')
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - name: 🛡️ Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: 🔑 Generate GitHub App Token
        continue-on-error: true
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: generate-token
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          # Least-privilege token scope: only pushes MegaLinter auto-fixes back to the
          # PR branch (contents). MegaLinter's PR/issue reporting uses the default
          # GITHUB_TOKEN (job permissions below), not this App token.
          permission-contents: write

      - name: 📄 Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: ${{ steps.generate-token.outcome == 'success' }}
          token: ${{ steps.generate-token.outputs.token || github.token }}

      - name: ⚙️ Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - name: 🧹 Lint
        id: ml
        uses: oxsecurity/megalinter/flavors/go@0e3ce9b9c8c10effb9b269509cc47ca17cae31c7 # v9.5.0
        env:
          VALIDATE_ALL_CODEBASE: true
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLY_FIXES: all
          APPLY_FIXES_EVENT: all
          APPLY_FIXES_MODE: commit
          # actionlint (<=1.7.12, bundled in MegaLinter) doesn't yet know the `code-quality`
          # permission scope that GitHub Code Quality coverage requires callers to grant, so it
          # reports a false "unknown permission scope" error. Ignore it until actionlint catches up.
          ACTION_ACTIONLINT_ARGUMENTS: -ignore code-quality

      - name: Commit and push applied linter fixes
        if: |
          steps.generate-token.outcome == 'success'
          && github.event_name != 'merge_group'
          && !contains(fromJSON('["dependabot[bot]","dependabot","renovate[bot]","renovatebot","renovate"]'), github.event.pull_request.user.login)
          && !contains(fromJSON('["dependabot[bot]","dependabot","renovate[bot]","renovatebot","renovate"]'), inputs.pr-owner)
        uses: stefanzweifel/git-auto-commit-action@04702edda442b2e678b25b537cec683a1493fcb9 # v7.1.0
        with:
          commit_message: "chore: Apply megalinter fixes"
          commit_user_name: megalinter-bot
          commit_user_email: 129584137+megalinter-bot@users.noreply.github.com

      - name: ❌ Fail if uncommitted changes remain (fork PR)
        if: steps.generate-token.outcome != 'success'
        shell: bash
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "::error::Auto-fix produced changes that cannot be committed (fork PR). Please run the fix locally and push."
            echo ""
            echo "Changed files:"
            git diff --stat
            echo ""
            echo "Full diff:"
            git diff
            exit 1
          fi

  build:
    name: 🏗️ Build
    runs-on: ubuntu-latest
    needs: [changes]
    # Skip if no Go files changed or on reusable-workflows repo
    if: |
      github.repository != 'devantler-tech/reusable-workflows'
      && needs.changes.outputs.go == 'true'
    permissions:
      contents: write
    steps:
      - name: 🛡️ Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: 📑 Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: ⚙️ Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: 🛠️ Build
        run: go build -v ./...

  test:
    name: 🧪 Test
    runs-on: ubuntu-latest
    needs: [changes]
    # Skip if no Go files changed or on reusable-workflows repo
    if: |
      github.repository != 'devantler-tech/reusable-workflows'
      && needs.changes.outputs.go == 'true'
    permissions:
      contents: write
    steps:
      - name: 🛡️ Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: 📑 Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: ⚙️ Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: 🧪 Test
        run: |
          go test ./...

  coverage:
    name: 📊 Code Coverage
    runs-on: ubuntu-latest
    needs: [changes]
    # Skip if no Go files changed or on reusable-workflows repo
    if: |
      github.repository != 'devantler-tech/reusable-workflows'
      && needs.changes.outputs.go == 'true'
    permissions:
      contents: write
      # Required by upload-coverage to post coverage to GitHub Code Quality. The CALLING workflow
      # must also grant this (a reusable workflow's token is capped by the caller's grant).
      code-quality: write
    steps:
      - name: 🛡️ Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: 📑 Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: ⚙️ Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: 👨🏻‍🔧 Enable covdata (temp) see https://github.com/golang/go/issues/75031
        run: go env -w GOTOOLCHAIN=go1.26.0+auto

      - name: 📄 Generate coverage
        run: |
          go test -race -coverprofile=coverage.txt -covermode=atomic ./...

      # best-effort: coverage reporting is a preview feature and must never block a Go PR. This job
      # runs on every Go PR org-wide via the required-workflow ruleset (pinned to this repo's main).
      - name: 🔄 Convert coverage to Cobertura
        continue-on-error: true
        run: |
          go run github.com/boumenot/gocover-cobertura@v1.5.0 < coverage.txt > coverage.cobertura.xml

      # Uploads coverage to GitHub Code Quality (native PR coverage). best-effort: never blocks CI.
      - name: 📊 Upload coverage
        continue-on-error: true
        uses: devantler-tech/actions/upload-coverage@7dbc3c310c46eb51b0f298de2de0e2d9c6552eae # v4.0.0
        with:
          file: coverage.cobertura.xml
          language: Go
          label: code-coverage/go
